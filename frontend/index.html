  <body>
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('hpe_theme') || '{}');
        document.documentElement.setAttribute('data-aes',  t.aesthetic || 'soft');
        document.documentElement.setAttribute('data-mode', t.mode      || 'dark');
      } catch(e) {
        document.documentElement.setAttribute('data-aes',  'soft');
        document.documentElement.setAttribute('data-mode', 'dark');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
